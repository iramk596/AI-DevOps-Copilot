version: "3.9"

services:

  backend:
    build:
      context: ./backend

    container_name: ai-devops-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    restart: always

  frontend:
    build:
      context: ./frontend

    container_name: ai-devops-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - VITE_API_URL=http://localhost:8000

    depends_on:
      - backend

    restart: always

  postgres:
    image: postgres:16

    container_name: ai-devops-postgres

    restart: always

    environment:
      POSTGRES_DB: aidevops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: