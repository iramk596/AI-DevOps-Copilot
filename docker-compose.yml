version: "3.9"

services:

  backend:

    build:
      context: ./backend

    container_name: ai-devops-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    restart: always

  frontend:

    build:
      context: ./frontend

    container_name: ai-devops-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - VITE_API_URL=http://localhost:8000

    depends_on:
      - backend

    restart: always