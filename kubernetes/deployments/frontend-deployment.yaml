apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-devops-frontend

  template:
    metadata:
      labels:
        app: ai-devops-frontend

    spec:
      containers:
      - name: frontend
        image: iramkhan123/ai-devops-frontend:v2

        ports:
        - containerPort: 80

        env:
        - name: VITE_API_URL
          value: "http://ai-devops-backend-service:8000"