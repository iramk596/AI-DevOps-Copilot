apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-devops-sa

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-devops-role

rules:
- apiGroups: [""]
  resources:
    - pods
    - services
    - namespaces
    - nodes
    - events
  verbs:
    - get
    - list
    - watch

- apiGroups: ["metrics.k8s.io"]
  resources:
    - pods
    - nodes
  verbs:
    - get
    - list
    - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-devops-binding

subjects:
- kind: ServiceAccount
  name: ai-devops-sa
  namespace: default

roleRef:
  kind: ClusterRole
  name: ai-devops-role
  apiGroup: rbac.authorization.k8s.io